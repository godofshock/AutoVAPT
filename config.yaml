# ============================================================
# AutoVAPT Configuration File
# ============================================================
# Copy this file to config.yaml and edit as needed.
# Sensitive values (API keys, passwords) should be set via
# environment variables rather than hardcoded here.

# ── Nmap settings ────────────────────────────────────────────
nmap:
  timing: T3          # T1–T5 (T3 = normal, T4 = aggressive)
  top_ports: 1000     # Ports to scan
  version_detection: true
  script_scan: true
  os_detection: true

# ── Nikto-style HTTP checks ───────────────────────────────────
nikto:
  timeout: 300
  tuning: "1234567890"

# ── NVD API (NIST National Vulnerability Database) ───────────
# Get a free API key at: https://nvd.nist.gov/developers/request-an-api-key
# Set the NVD_API_KEY environment variable instead of here.
nvd_api:
  base_url: "https://services.nvd.nist.gov/rest/json/cves/2.0"
  api_key: ""           # Prefer: export NVD_API_KEY=your_key
  results_per_page: 10
  timeout: 15

# ── Metasploit RPC ────────────────────────────────────────────
# Start with: msfrpcd -P msf -S -f -a 127.0.0.1
metasploit:
  host: "127.0.0.1"
  port: 55553
  username: "msf"
  password: "msf"       # Change this in production
  ssl: false
  timeout: 60

# ── Risk scoring ──────────────────────────────────────────────
risk:
  critical_threshold: 9.0
  high_threshold: 7.0
  medium_threshold: 4.0
  # Asset criticality multiplies composite score
  # Values: low (×0.8) | medium (×1.0) | high (×1.2) | critical (×1.3)
  asset_criticality: "medium"

# ── Report ────────────────────────────────────────────────────
report:
  company_name: "AutoVAPT Security Assessment"
  assessor_name: "Aagnik"
  logo_path: ""         # Optional: path to logo PNG for PDF cover

# ── Scan behaviour ────────────────────────────────────────────
scan:
  intensity: "medium"   # low | medium | high
  max_threads: 10
  timeout: 600          # Global scan timeout in seconds
